name: Build and deploy ASP.Net Core app to Azure Web App - eduvision-api

on:
  push:
    branches:
      - deploy-be
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore EduVision/EduVision.csproj

      - name: Build with dotnet
        run: dotnet build EduVision/EduVision.csproj --configuration Release --no-restore

      - name: Publish with dotnet
        run: dotnet publish EduVision/EduVision.csproj --configuration Release --no-build --output ./published-app

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./published-app

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./published-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4225A74C2693437B937F5F9294709F65 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2809B259928C4B4791E470FB0B9C347D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D7A0F7D39444409DB96423974E9261E0 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'eduvision-api'
          slot-name: 'Production'
          package: ./published-app
