<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lesson Presentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/theme/white.css">
    <style>
        body {
            background: #f7f6f2;
        }

        .reveal .slides {
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        section {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-card {
            background: #fffdfa;
            border-radius: 16px;
            border: 1.5px solid #e0e0e0;
            box-shadow: 0 4px 32px rgba(0,0,0,0.07);
            padding: 56px 72px 48px 72px;
            display: flex;
            flex-direction: row;
            gap: 64px;
            align-items: stretch;
            box-sizing: border-box;
            width: 90vw;
            max-width: 1600px;
            height: 80vh;
            max-height: 800px;
            margin: auto;
        }

        .custom-left {
            flex: 2;
            border-right: 2px solid #e5e5e5;
            padding-right: 56px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .custom-title {
            font-size: 2.0rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            margin-bottom: 36px;
            color: #1a1a1a;
            text-align: left;
            line-height: 2.2;
            position: relative;
            padding-bottom: 0.5rem;
        }

            .custom-title::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                height: 3px;
                width: 600px;
                background-color: burlywood;
                margin-bottom: 20px;
            }

        .custom-content {
            font-size: 1.5rem;
            color: #333;
            line-height: 1.6;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .custom-right {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 320px;
            min-height: 0;
        }

        .custom-image-frame {
            border: 1px solid #ccc;
            padding: 8px;
            background: #fff;
            width: 100%;
            box-sizing: border-box;
            max-width: 520px;
            max-height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .custom-image-frame img {
                width: 100%;
                height: auto;
                max-height: 320px;
                display: block;
                border-radius: 4px;
                object-fit: cover;
                background: #f7f6f2;
            }

        /* Responsive adjustments */
        @media (max-width: 1200px) {
            .custom-card {
                flex-direction: column;
                width: 98vw;
                height: auto;
                max-width: 98vw;
                max-height: none;
                padding: 32px 8vw 32px 8vw;
                gap: 32px;
            }

            .custom-left {
                border-right: none;
                border-bottom: 2px solid #e5e5e5;
                padding-right: 0;
                padding-bottom: 32px;
            }

            .custom-right {
                min-width: 0;
            }
        }

        @media (max-width: 700px) {
            .custom-card {
                padding: 12px 2vw 12px 2vw;
            }

            .custom-title {
                font-size: 1.3rem;
            }

            .custom-content {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            {{slides}}
        </div>
    </div>
    <script src="https://unpkg.com/reveal.js/dist/reveal.js"></script>
    <script>
        Reveal.initialize({
            width: 1920,
            height: 1080
        });
    </script>
</body>
</html>
