<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lesson Presentation - Modern</title>
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/theme/league.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: #f5f7fa;
        }

        .reveal, .slides, section {
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        .slide-flex {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            box-sizing: border-box;
            overflow: hidden;
        }

        .slide-image-panel {
            flex: 0 0 35%;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80%;
            min-width: 0;
            padding: 0 1vw;
            box-sizing: border-box;
        }

        .slide-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            background: #fff;
            object-fit: contain;
        }

        .slide-content-panel {
            flex: 1 1 65%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80%;
            min-width: 0;
            max-width: 900px;
            padding: 0 1vw;
            box-sizing: border-box;
        }

        .slide-title {
            color: #1976d2;
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 0.4em;
            line-height: 1.1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.08);
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            text-align: left;
        }

        .slide-content {
            color: #333;
            font-size: 1.2em;
            line-height: 1.5;
            background: #fff;
            border-radius: 16px;
            padding: 1em 1.2em;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            text-align: left;
        }

        @media (max-width: 1200px) {
            .slide-flex {
                flex-direction: column;
                max-width: 98vw;
            }

            .slide-image-panel, .slide-content-panel {
                width: 100%;
                padding: 0;
                height: auto;
            }

            .slide-image {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            {{slides}}
        </div>
    </div>
    <script src="https://unpkg.com/reveal.js/dist/reveal.js"></script>
    <script>Reveal.initialize({ width: 1920, height: 1080 });</script>
</body>
</html>
